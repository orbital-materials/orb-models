name: Publish Python Package

on:
  release:
    types: [created]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    if: startsWith(github.ref, 'refs/tags/') 
    steps:
    - uses: actions/checkout@v4
    - name: Update version
      run: |
        echo "__version__ = \"${{ github.event.release.tag_name }}\"" > orb_models/__init__.py
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: pyproject.toml
    - name: Set up uv
      run: |
        pip install uv
    - name: Install dependencies
      run: uv sync --group dev

    - name: Run linters
      run: |
        uv run ruff check ./orb_models ./tests ./scripts
        uv run ruff format --check ./orb_models ./tests ./scripts
        uv run mypy ./orb_models ./tests ./scripts
    - name: Run tests
      run: uv run pytest ./tests -n auto

  deploy:
    runs-on: ubuntu-latest
    needs: [test]
    environment: release
    permissions:
      id-token: write
      contents: read
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: pip
        cache-dependency-path: pyproject.toml
    - name: Update version
      run: |
        echo "__version__ = \"${{ github.event.release.tag_name }}\"" > orb_models/__init__.py
    - name: Install dependencies
      run: |
        pip install setuptools wheel build
    - name: Build
      run: |
        python -m build
    - name: Publish
      uses: pypa/gh-action-pypi-publish@release/v1