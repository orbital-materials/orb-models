name: Test

on: [push, pull_request]

permissions:
  contents: read


jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
    - uses: actions/checkout@v4
    - name: Update version
      run: |
        echo __version__ = \"1.0.0\" > orb_models/__init__.py
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: pip
        cache-dependency-path: pyproject.toml
    - name: Set up uv
      run: |
        pip install uv
    - name: Install dependencies
      run: uv sync --group dev

    - name: Run linters
      run: |
        uv run ruff check ./orb_models ./tests ./internal
        uv run ruff format --check ./orb_models ./tests ./internal
        uv run mypy ./orb_models ./tests ./internal
    - name: Run tests
      run: uv run pytest ./tests -n auto
